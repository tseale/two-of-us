name: MillerTime
options:
  bundleIdPrefix: com.taylorseale
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  MillerTime:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MillerTime
    info:
      path: MillerTime/Info.plist
      properties:
        CFBundleDisplayName: Miller Time
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSupportsLiveActivities: YES
        NSAlarmKitUsageDescription: Miller Time uses alarms to remind you when the next feed is due, even when your phone is silenced.
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: MillerTime/MillerTime.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.taylorseale.millertime
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.taylorseale.millertime
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taylorseale.millertime
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: MillerTimeWidgets

  MillerTimeWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MillerTimeWidgets
      - path: MillerTime/Models/Baby.swift
      - path: MillerTime/Models/FeedEvent.swift
      - path: MillerTime/Models/SleepEvent.swift
      - path: MillerTime/Models/DiaperEvent.swift
      - path: MillerTime/Models/Participant.swift
      - path: MillerTime/Models/SharedSettings.swift
      - path: MillerTime/Models/Enums.swift
      - path: MillerTime/Store/Schema.swift
      - path: MillerTime/Support/AppGroup.swift
      - path: MillerTime/DesignSystem/Colors.swift
      - path: MillerTime/DesignSystem/TimeFormatting.swift
      - path: MillerTime/DesignSystem/Urgency.swift
      - path: MillerTime/DesignSystem/DayRibbon.swift
      - path: MillerTime/LiveActivities/SleepActivityAttributes.swift
      # Shared with the app target: interactive-widget / Siri App Intents + their writer.
      - path: MillerTime/Intents/QuickLogger.swift
      - path: MillerTime/Intents/LogFeedIntent.swift
      - path: MillerTime/Intents/LogDiaperIntent.swift
      - path: MillerTime/Intents/ToggleSleepIntent.swift
      - path: MillerTime/Intents/ConfirmationSnippet.swift
    info:
      path: MillerTimeWidgets/Info.plist
      properties:
        CFBundleDisplayName: MillerTimeWidgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: MillerTimeWidgets/MillerTimeWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.taylorseale.millertime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taylorseale.millertime.widgets
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO

schemes:
  MillerTime:
    build:
      targets:
        MillerTime: all
    run:
      config: Debug
    archive:
      config: Release

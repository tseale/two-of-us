name: TwoOfUs
options:
  bundleIdPrefix: com.taylorseale
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: Q58H65DQ64
    CODE_SIGN_STYLE: Automatic

targets:
  TwoOfUs:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: TwoOfUs
    info:
      path: TwoOfUs/Info.plist
      properties:
        CFBundleDisplayName: Two of Us
        # Only standard HTTPS/CloudKit crypto — exempt. Without this, every
        # TestFlight build waits on a manual export-compliance answer in ASC.
        ITSAppUsesNonExemptEncryption: NO
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSupportsLiveActivities: YES
        NSAlarmKitUsageDescription: Two of Us uses alarms to remind you when the next feed is due, even when your phone is silenced.
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: TwoOfUs/TwoOfUs.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.taylorseale.twoofus
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.taylorseale.twoofus
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taylorseale.twoofus
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: TwoOfUsWidgets

  TwoOfUsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: TwoOfUsWidgets
      - path: TwoOfUs/Models/Baby.swift
      - path: TwoOfUs/Models/FeedEvent.swift
      - path: TwoOfUs/Models/SleepEvent.swift
      - path: TwoOfUs/Models/DiaperEvent.swift
      - path: TwoOfUs/Models/Participant.swift
      - path: TwoOfUs/Models/SharedSettings.swift
      - path: TwoOfUs/Models/Enums.swift
      - path: TwoOfUs/Store/Schema.swift
      - path: TwoOfUs/Support/AppGroup.swift
      - path: TwoOfUs/DesignSystem/Colors.swift
      - path: TwoOfUs/DesignSystem/Typography.swift
      - path: TwoOfUs/DesignSystem/TimeFormatting.swift
      - path: TwoOfUs/DesignSystem/Urgency.swift
      - path: TwoOfUs/DesignSystem/DayRibbon.swift
      - path: TwoOfUs/LiveActivities/SleepActivityAttributes.swift
      # Shared with the app target: interactive-widget / Siri App Intents + their writer.
      - path: TwoOfUs/Intents/QuickLogger.swift
      - path: TwoOfUs/Intents/LogFeedIntent.swift
      - path: TwoOfUs/Intents/LogDiaperIntent.swift
      - path: TwoOfUs/Intents/ToggleSleepIntent.swift
      - path: TwoOfUs/Intents/ConfirmationSnippet.swift
    info:
      path: TwoOfUsWidgets/Info.plist
      properties:
        CFBundleDisplayName: TwoOfUsWidgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TwoOfUsWidgets/TwoOfUsWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.taylorseale.twoofus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taylorseale.twoofus.widgets
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO

schemes:
  TwoOfUs:
    build:
      targets:
        TwoOfUs: all
    run:
      config: Debug
    archive:
      config: Release

# When a TestFlight feedback issue lands (or you re-apply the label to retry),
# Claude analyzes it, plans a fix, implements it, and opens a draft PR for review.
# Nothing merges without a human — the PR is the approval gate.

name: TestFlight autofix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: testflight-autofix-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.label.name == 'testflight-feedback'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 60"
          prompt: |
            You are handling TestFlight beta feedback for Two of Us, a SwiftUI/SwiftData
            iOS baby-tracking app (see CLAUDE.md and docs/ for architecture). The repo
            has no committed .xcodeproj — XcodeGen generates it from project.yml — and
            CI runners here are Linux, so you cannot build or run the app. Rely on
            careful reading of the existing code and keep changes conservative.

            A beta tester submitted the feedback in issue #${{ github.event.issue.number }}:

            ---
            ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
            ---

            Work through these steps:

            1. TRIAGE. Decide whether this is an actionable bug/defect in the app code.
               Crash feedback with a stack trace, or a comment describing broken
               behavior, is actionable. Praise, feature requests, vague complaints you
               cannot localize in the code, or problems clearly outside the app
               (e.g. CloudKit outage, TestFlight itself) are not.
               - If NOT actionable: add the label "needs-human" to issue
                 #${{ github.event.issue.number }}, post a comment explaining your
                 triage reasoning and what extra information would make it actionable,
                 and STOP. Do not open a PR.

            2. ANALYZE. Locate the relevant code. For crashes, map the stack trace to
               source files; for behavioral reports, find the views/models involved.

            3. PLAN. Write a short plan: root cause hypothesis, the fix, and risks.

            4. IMPLEMENT. Make the smallest correct fix. Match the existing SwiftUI/
               SwiftData style. Do not refactor unrelated code. Do not bump versions.

            5. OPEN A PR. Create a branch named claude/testflight-${{ github.event.issue.number }},
               commit with a clear message, push, and open a DRAFT pull request
               targeting main. The PR body must include:
               - "Fixes #${{ github.event.issue.number }}"
               - A summary of the tester's report
               - Your root-cause analysis and the plan from step 3
               - What you changed and why
               - A short manual test script the reviewer can run on-device to verify
               Then comment on issue #${{ github.event.issue.number }} linking the PR.

            If at any point you determine you cannot produce a safe fix, fall back to
            the not-actionable path in step 1 instead of opening a speculative PR.
